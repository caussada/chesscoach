<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChessCoach</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://unpkg.com/chessground@9.1.1/dist/chessground.base.css">
<link rel="stylesheet" href="https://unpkg.com/chessground@9.1.1/dist/chessground.brown.css">
<link rel="stylesheet" href="https://unpkg.com/chessground@9.1.1/dist/chessground.cburnett.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e; color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 12px;
}
.header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.header h1 { font-size: 1.4rem; color: #fff; }

/* CRITICAL: chessground needs explicit width+height on both wrapper and cg-wrap */
#board {
  width: min(90vw, 400px);
  height: min(90vw, 400px);
}
cg-wrap {
  width: 100% !important;
  height: 100% !important;
}

.explanation {
  max-width: 400px; width: 100%; margin-top: 16px;
  padding: 12px 16px; background: #16213e; border-radius: 10px;
  font-size: 0.95rem; line-height: 1.5; color: #ccc; text-align: center;
}
.explanation .bad { color: #e94560; font-weight: bold; }
.explanation .good { color: #4ade80; font-weight: bold; }
.nav { display: flex; gap: 10px; margin-top: 14px; }
.nav button {
  background: #0f3460; color: #fff; border: none; border-radius: 8px;
  padding: 10px 20px; font-size: 1rem; cursor: pointer;
}
.nav button:hover { background: #e94560; }
.nav button:disabled { opacity: .35; cursor: default; background: #0f3460; }
.move-info { margin-top: 8px; font-size: .85rem; color: #888; }
</style>
</head>
<body>
<div class="header"><span style="font-size:1.6rem">♟️</span><h1>ChessCoach</h1></div>
<div id="board"></div>
<div class="explanation" id="explanation" style="display:none"></div>
<div class="move-info" id="moveInfo"></div>
<div class="nav" id="nav" style="display:none">
  <button id="btnStart">⏮</button>
  <button id="btnPrev">◀</button>
  <button id="btnNext">▶</button>
  <button id="btnEnd">⏭</button>
</div>

<script type="module">
import { Chessground } from 'https://unpkg.com/chessground@9.1.1/dist/chessground.min.js';

/* --- Telegram WebApp --- */
try { window.Telegram?.WebApp?.ready(); window.Telegram?.WebApp?.expand(); } catch(e) {}

/* --- URL Params --- */
const P = new URLSearchParams(location.search);
const startFen = (P.get('fen') || 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1').replace(/\+/g, ' ');
const bad = P.get('bad') || '';
const good = P.get('good') || '';
const explanationText = decodeURIComponent(P.get('explanation') || '');
const orientation = P.get('orientation') || 'white';

/* --- Build arrows --- */
const shapes = [];
if (bad && bad.length >= 4) shapes.push({ orig: bad.slice(0,2), dest: bad.slice(2,4), brush: 'red' });
if (good && good.length >= 4) shapes.push({ orig: good.slice(0,2), dest: good.slice(2,4), brush: 'green' });

/* --- FEN → piece map for chessground --- */
function fenToPieces(fen) {
  const pieces = new Map();
  const rows = fen.split(' ')[0].split('/');
  const colorMap = { 'p':'black','r':'black','n':'black','b':'black','q':'black','k':'black',
                     'P':'white','R':'white','N':'white','B':'white','Q':'white','K':'white' };
  const roleMap = { 'p':'pawn','r':'rook','n':'knight','b':'bishop','q':'queen','k':'king',
                    'P':'pawn','R':'rook','N':'knight','B':'bishop','Q':'queen','K':'king' };
  for (let r = 0; r < 8; r++) {
    let c = 0;
    for (const ch of rows[r]) {
      if (ch >= '1' && ch <= '8') { c += parseInt(ch); }
      else {
        const file = 'abcdefgh'[c];
        const rank = String(8 - r);
        pieces.set(file + rank, { color: colorMap[ch], role: roleMap[ch.toLowerCase()] });
        c++;
      }
    }
  }
  return pieces;
}

/* --- Init Board --- */
const cg = Chessground(document.getElementById('board'), {
  fen: startFen,
  orientation: orientation,
  viewOnly: true,
  coordinates: true,
  drawable: {
    enabled: false,
    visible: true,
    autoShapes: shapes
  },
  animation: { enabled: true, duration: 300 }
});

/* --- Explanation --- */
if (explanationText) {
  const el = document.getElementById('explanation');
  el.style.display = 'block';
  el.innerHTML = explanationText;
}

/* --- Move info --- */
const turn = startFen.split(' ')[1] === 'w' ? 'Blancs' : 'Noirs';
const moveNum = startFen.split(' ')[5] || '?';
document.getElementById('moveInfo').textContent = `Coup ${moveNum} — Trait aux ${turn}`;

</script>
</body>
</html>
