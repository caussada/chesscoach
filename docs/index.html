<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChessCoach</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://unpkg.com/chessground@9.1.1/dist/chessground.base.css">
<link rel="stylesheet" href="https://unpkg.com/chessground@9.1.1/dist/chessground.brown.css">
<link rel="stylesheet" href="https://unpkg.com/chessground@9.1.1/dist/chessground.cburnett.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 12px; }
.header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.header h1 { font-size: 1.4rem; color: #fff; }
.board-wrap { width: 100%; max-width: 400px; aspect-ratio: 1; }
.board-wrap cg-board { width: 100%; height: 100%; }
.explanation { max-width: 400px; width: 100%; margin-top: 16px; padding: 12px 16px; background: #16213e; border-radius: 10px; font-size: 0.95rem; line-height: 1.5; color: #ccc; text-align: center; }
.explanation strong { color: #e94560; }
.nav { display: flex; gap: 10px; margin-top: 14px; }
.nav button { background: #0f3460; color: #fff; border: none; border-radius: 8px; padding: 10px 20px; font-size: 1rem; cursor: pointer; transition: background .2s; }
.nav button:hover { background: #e94560; }
.nav button:disabled { opacity: .35; cursor: default; background: #0f3460; }
.move-info { margin-top: 8px; font-size: .85rem; color: #888; }
</style>
</head>
<body>
<div class="header"><span style="font-size:1.6rem">♟️</span><h1>ChessCoach</h1></div>
<div class="board-wrap" id="board"></div>
<div class="explanation" id="explanation" style="display:none"></div>
<div class="move-info" id="moveInfo"></div>
<div class="nav" id="nav" style="display:none">
  <button id="btnStart">⏮</button>
  <button id="btnPrev">◀</button>
  <button id="btnNext">▶</button>
  <button id="btnEnd">⏭</button>
</div>

<script type="module">
import { Chessground } from 'https://unpkg.com/chessground@9.1.1/dist/chessground.min.js';

const params = new URLSearchParams(location.search);
const fen = params.get('fen') || 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
const bad = params.get('bad') || '';
const good = params.get('good') || '';
const explanation = params.get('explanation') || '';
const pgnStr = params.get('pgn') || '';
const highlightMove = parseInt(params.get('move')) || 0;
const orientation = params.get('orientation') || 'white';

// Parse PGN moves (simple: strip move numbers and annotations)
function parsePGN(pgn) {
  if (!pgn) return [];
  return pgn.replace(/\{[^}]*\}/g, '').replace(/\d+\.\s*/g, '').replace(/1-0|0-1|1\/2-1\/2|\*/g, '').trim().split(/\s+/).filter(Boolean);
}

// Minimal chess logic for applying moves to a FEN
// We need a small engine to convert SAN to UCI and update FEN
// Using a lightweight approach: embed a tiny move parser

const PIECES = 'PNBRQKpnbrqk';
const COLS = 'abcdefgh';

function fenToBoard(fen) {
  const rows = fen.split(' ')[0].split('/');
  const board = [];
  for (let r = 0; r < 8; r++) {
    board[r] = [];
    let c = 0;
    for (const ch of rows[r]) {
      if (ch >= '1' && ch <= '8') { for (let i = 0; i < parseInt(ch); i++) board[r][c++] = ''; }
      else board[r][c++] = ch;
    }
  }
  return board;
}

function boardToFen(board) {
  return board.map(row => {
    let s = '', empty = 0;
    for (const c of row) {
      if (c === '') empty++;
      else { if (empty) { s += empty; empty = 0; } s += c; }
    }
    if (empty) s += empty;
    return s;
  }).join('/');
}

function parseFenFull(fen) {
  const parts = fen.split(' ');
  return { board: fenToBoard(fen), turn: parts[1] || 'w', castling: parts[2] || '-', ep: parts[3] || '-', half: parseInt(parts[4]) || 0, full: parseInt(parts[5]) || 1 };
}

function fenFromState(st) {
  return boardToFen(st.board) + ' ' + st.turn + ' ' + st.castling + ' ' + st.ep + ' ' + st.half + ' ' + st.full;
}

function sq(col, row) { return [7 - row, col]; }
function fromAlg(s) { return sq(COLS.indexOf(s[0]), parseInt(s[1]) - 1); }

function isWhite(p) { return p && p === p.toUpperCase(); }

function applyMove(state, san) {
  const b = state.board.map(r => [...r]);
  const white = state.turn === 'w';
  let castling = state.castling;
  let ep = '-';
  let half = state.half + 1;
  let captured = false;

  // Castling
  if (san === 'O-O' || san === 'O-O-O') {
    const row = white ? 7 : 0;
    if (san === 'O-O') {
      b[row][6] = b[row][4]; b[row][5] = b[row][7]; b[row][4] = ''; b[row][7] = '';
    } else {
      b[row][2] = b[row][4]; b[row][3] = b[row][0]; b[row][4] = ''; b[row][0] = '';
    }
    castling = castling.replace(white ? /[KQ]/g : /[kq]/g, '') || '-';
  } else {
    // Parse SAN
    let s = san.replace(/[+#!?]/g, '');
    let promotion = '';
    if (s.includes('=')) { promotion = s.split('=')[1][0]; s = s.split('=')[0]; }
    const isCapture = s.includes('x');
    s = s.replace('x', '');

    let piece, destStr, disambig = '';
    if (s[0] >= 'a' && s[0] <= 'h' && s.length <= 3) {
      // Pawn move
      piece = white ? 'P' : 'p';
      destStr = s.slice(-2);
      if (s.length === 3 || isCapture) disambig = san[0];
    } else if (s[0] >= 'A' && s[0] <= 'Z') {
      piece = white ? s[0] : s[0].toLowerCase();
      destStr = s.slice(-2);
      disambig = s.slice(1, -2);
    } else {
      piece = white ? 'P' : 'p';
      destStr = s.slice(-2);
    }

    const [dr, dc] = fromAlg(destStr);

    // Find source
    let sr = -1, sc2 = -1;
    for (let r = 0; r < 8; r++) {
      for (let c = 0; c < 8; c++) {
        if (b[r][c] !== piece) continue;
        if (disambig) {
          if (disambig.length === 1) {
            if (disambig >= 'a' && disambig <= 'h' && c !== COLS.indexOf(disambig)) continue;
            if (disambig >= '1' && disambig <= '8' && r !== 7 - (parseInt(disambig) - 1)) continue;
          } else if (disambig.length === 2) {
            const [xr, xc] = fromAlg(disambig);
            if (r !== xr || c !== xc) continue;
          }
        }
        if (canMove(b, piece, r, c, dr, dc, state.ep)) { sr = r; sc2 = c; }
      }
    }

    if (sr === -1) { /* can't find move, skip */ return { ...state, turn: white ? 'b' : 'w', full: white ? state.full : state.full + 1 }; }

    captured = b[dr][dc] !== '';
    // En passant capture
    if (piece.toUpperCase() === 'P' && dc !== sc2 && b[dr][dc] === '') {
      b[sr][dc] = ''; captured = true;
    }

    b[dr][dc] = promotion ? (white ? promotion.toUpperCase() : promotion.toLowerCase()) : piece;
    b[sr][sc2] = '';

    // Pawn double push -> ep square
    if (piece.toUpperCase() === 'P' && Math.abs(dr - sr) === 2) {
      const epRow = (sr + dr) / 2;
      ep = COLS[dc] + (8 - epRow);
    }

    if (piece.toUpperCase() === 'P' || captured) half = 0;

    // Update castling
    if (piece.toUpperCase() === 'K') castling = castling.replace(white ? /[KQ]/g : /[kq]/g, '');
    if (sr === 7 && sc2 === 7) castling = castling.replace('K', '');
    if (sr === 7 && sc2 === 0) castling = castling.replace('Q', '');
    if (sr === 0 && sc2 === 7) castling = castling.replace('k', '');
    if (sr === 0 && sc2 === 0) castling = castling.replace('q', '');
    if (!castling) castling = '-';
  }

  return { board: b, turn: white ? 'b' : 'w', castling, ep, half, full: white ? state.full : state.full + 1 };
}

function canMove(b, piece, sr, sc, dr, dc, epSq) {
  const p = piece.toUpperCase();
  const rdiff = dr - sr, cdiff = dc - sc;
  const ar = Math.abs(rdiff), ac = Math.abs(cdiff);

  if (p === 'P') {
    const dir = piece === 'P' ? -1 : 1;
    const startRow = piece === 'P' ? 6 : 1;
    if (cdiff === 0 && rdiff === dir && b[dr][dc] === '') return true;
    if (cdiff === 0 && sr === startRow && rdiff === 2 * dir && b[dr][dc] === '' && b[sr + dir][sc] === '') return true;
    if (ac === 1 && rdiff === dir) {
      if (b[dr][dc] !== '') return true;
      // en passant
      const epStr = epSq;
      if (epStr !== '-') { const [er, ec] = fromAlg(epStr); if (er === dr && ec === dc) return true; }
    }
    return false;
  }
  if (p === 'N') return (ar === 2 && ac === 1) || (ar === 1 && ac === 2);
  if (p === 'K') return ar <= 1 && ac <= 1;

  if (p === 'B' || p === 'Q') {
    if (ar === ac && ar > 0) { if (pathClear(b, sr, sc, dr, dc)) return true; }
    if (p === 'B') return false;
  }
  if (p === 'R' || p === 'Q') {
    if ((ar === 0 || ac === 0) && (ar + ac > 0)) { if (pathClear(b, sr, sc, dr, dc)) return true; }
  }
  return false;
}

function pathClear(b, sr, sc, dr, dc) {
  const ri = Math.sign(dr - sr), ci = Math.sign(dc - sc);
  let r = sr + ri, c = sc + ci;
  while (r !== dr || c !== dc) { if (b[r][c] !== '') return false; r += ri; c += ci; }
  return true;
}

// Build positions from PGN
const startFen = 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1';
const moves = parsePGN(pgnStr);
const positions = [startFen];

if (moves.length > 0) {
  let state = parseFenFull(startFen);
  for (const m of moves) {
    state = applyMove(state, m);
    positions.push(fenFromState(state));
  }
}

// Arrows
function makeShapes(currentIdx) {
  const shapes = [];
  const showArrows = highlightMove > 0 ? currentIdx === highlightMove : moves.length === 0;
  if (showArrows) {
    if (bad) { const o = bad.slice(0, 2), d = bad.slice(2, 4); shapes.push({ orig: o, dest: d, brush: 'red' }); }
    if (good) { const o = good.slice(0, 2), d = good.slice(2, 4); shapes.push({ orig: o, dest: d, brush: 'green' }); }
  }
  return shapes;
}

// Determine initial position index
let currentIdx = 0;
if (moves.length > 0 && highlightMove > 0) {
  currentIdx = Math.min(highlightMove, positions.length - 1);
} else if (moves.length === 0 && fen) {
  positions[0] = fen;
}

// Init board
const boardEl = document.getElementById('board');
const cg = Chessground(boardEl, {
  fen: positions[currentIdx],
  orientation: orientation,
  viewOnly: true,
  coordinates: true,
  drawable: { enabled: false, autoShapes: makeShapes(currentIdx) }
});

// Explanation
const expEl = document.getElementById('explanation');
if (explanation) { expEl.style.display = 'block'; expEl.innerHTML = decodeURIComponent(explanation); }

// Navigation
const nav = document.getElementById('nav');
const moveInfoEl = document.getElementById('moveInfo');

function updateBoard() {
  cg.set({ fen: positions[currentIdx], drawable: { autoShapes: makeShapes(currentIdx) } });
  document.getElementById('btnStart').disabled = currentIdx === 0;
  document.getElementById('btnPrev').disabled = currentIdx === 0;
  document.getElementById('btnNext').disabled = currentIdx >= positions.length - 1;
  document.getElementById('btnEnd').disabled = currentIdx >= positions.length - 1;
  if (moves.length > 0) {
    moveInfoEl.textContent = currentIdx === 0 ? 'Position initiale' : `Coup ${Math.ceil(currentIdx / 2)}${currentIdx % 2 === 1 ? '.' : '...'} ${moves[currentIdx - 1]}`;
  }
}

if (moves.length > 0) {
  nav.style.display = 'flex';
  document.getElementById('btnStart').onclick = () => { currentIdx = 0; updateBoard(); };
  document.getElementById('btnPrev').onclick = () => { if (currentIdx > 0) currentIdx--; updateBoard(); };
  document.getElementById('btnNext').onclick = () => { if (currentIdx < positions.length - 1) currentIdx++; updateBoard(); };
  document.getElementById('btnEnd').onclick = () => { currentIdx = positions.length - 1; updateBoard(); };
  updateBoard();
}

// Telegram WebApp
if (window.Telegram?.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}
</script>
</body>
</html>
