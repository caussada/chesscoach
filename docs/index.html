<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ChessCoach</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e; color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex; flex-direction: column; align-items: center;
  min-height: 100vh; padding: 10px;
  user-select: none; -webkit-user-select: none;
}
.header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.header h1 { font-size: 1.4rem; color: #fff; }

/* Board + eval bar layout */
.board-area {
  display: flex; align-items: stretch; gap: 0;
}
.eval-bar {
  width: 28px; border-radius: 6px; overflow: hidden; position: relative;
  display: flex; flex-direction: column; flex-shrink: 0;
  border: 1px solid #333;
}
.eval-bar-white {
  background: #f0f0f0; transition: flex 0.4s ease;
  display: flex; align-items: flex-end; justify-content: center;
}
.eval-bar-black {
  background: #333; transition: flex 0.4s ease;
  display: flex; align-items: flex-start; justify-content: center;
}
.eval-bar-score {
  font-size: 10px; font-weight: bold; padding: 2px;
  writing-mode: vertical-lr; text-orientation: mixed;
  transform: rotate(180deg);
}
.eval-bar-white .eval-bar-score { color: #333; }
.eval-bar-black .eval-bar-score { color: #ccc; }

.board-container {
  width: min(88vw, 400px); height: min(88vw, 400px);
  position: relative; touch-action: none;
}
.board-container svg { width: 100%; height: 100%; }

/* Horizontal eval bar for mobile */
.eval-bar-h {
  display: none; width: min(88vw, 400px); height: 22px;
  border-radius: 4px; overflow: hidden; margin-top: 4px;
  border: 1px solid #333; position: relative; flex-direction: row;
}
.eval-bar-h .eval-bar-white {
  flex-direction: row; align-items: center; justify-content: flex-end;
}
.eval-bar-h .eval-bar-black {
  flex-direction: row; align-items: center; justify-content: flex-start;
}
.eval-bar-h .eval-bar-score {
  writing-mode: horizontal-tb; transform: none; font-size: 11px; padding: 0 4px;
}

.nav { display: flex; gap: 8px; margin-top: 8px; }
.nav button {
  background: #0f3460; color: #fff; border: none; border-radius: 8px;
  padding: 10px 18px; font-size: 1.1rem; cursor: pointer;
  transition: background .15s;
}
.nav button:hover { background: #e94560; }
.nav button:disabled { opacity: .3; cursor: default; background: #0f3460; }

/* Analysis panel */
.analysis-panel {
  max-width: 440px; width: 100%; margin-top: 8px;
}
.engine-info {
  background: #16213e; border-radius: 10px; padding: 10px 14px; margin-bottom: 6px;
}
.engine-header {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
}
.engine-eval {
  font-size: 1.5rem; font-weight: bold; color: #fff;
}
.engine-depth { font-size: .75rem; color: #888; }
.engine-bestline {
  font-size: .82rem; color: #aab; line-height: 1.4;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.depth-slider {
  display: flex; align-items: center; gap: 8px; margin-top: 6px;
  font-size: .78rem; color: #888;
}
.depth-slider input { flex: 1; accent-color: #e94560; }

/* Explanation cards */
.explanation-card {
  background: #16213e; border-radius: 10px; padding: 12px 14px;
  margin-bottom: 6px; border-left: 4px solid #555;
  display: none;
}
.explanation-card.error { border-left-color: #e94560; }
.explanation-card.good { border-left-color: #4ade80; }
.explanation-card .card-title {
  font-size: .9rem; font-weight: bold; margin-bottom: 4px;
}
.explanation-card.error .card-title { color: #e94560; }
.explanation-card.good .card-title { color: #4ade80; }
.explanation-card .card-body {
  font-size: .85rem; color: #ccc; line-height: 1.5;
}

.move-info { margin-top: 4px; font-size: .82rem; color: #666; }

@media (max-width: 500px) {
  .eval-bar { display: none !important; }
  .eval-bar-h { display: flex !important; }
}
@media (min-width: 501px) {
  .eval-bar { display: flex !important; }
  .eval-bar-h { display: none !important; }
}

/* Quiz mode styles */
.quiz-panel {
  max-width: 440px; width: 100%; margin-top: 8px;
}
.quiz-card {
  background: #16213e; border-radius: 10px; padding: 14px 16px;
  margin-bottom: 6px; border-left: 4px solid #f0c040;
}
.quiz-card .quiz-title {
  font-size: 1.05rem; font-weight: bold; color: #f0c040; margin-bottom: 4px;
}
.quiz-card .quiz-subtitle {
  font-size: .85rem; color: #ccc; margin-bottom: 8px;
}
.quiz-card .quiz-attempts {
  font-size: .75rem; color: #888; margin-top: 6px;
}
.quiz-card .quiz-msg {
  font-size: .9rem; margin-top: 8px; min-height: 1.2em;
}
.quiz-card .quiz-msg.correct { color: #4ade80; }
.quiz-card .quiz-msg.wrong { color: #e94560; }

.quiz-btn {
  background: #0f3460; color: #fff; border: none; border-radius: 8px;
  padding: 8px 16px; font-size: .9rem; cursor: pointer; margin-top: 6px; margin-right: 6px;
  transition: background .15s;
}
.quiz-btn:hover { background: #e94560; }

.sources-card {
  background: #1a2744; border-radius: 10px; padding: 14px 16px;
  margin-bottom: 6px; border-left: 4px solid #60a5fa; display: none;
}
.sources-card .sources-title {
  font-size: .95rem; font-weight: bold; color: #60a5fa; margin-bottom: 6px;
}
.sources-card .sources-body {
  font-size: .85rem; color: #ccc; line-height: 1.5; white-space: pre-wrap;
}

.board-flash {
  animation: boardFlashRed 0.5s ease;
}
@keyframes boardFlashRed {
  0% { box-shadow: inset 0 0 0 6px rgba(233,69,96,0.8); }
  100% { box-shadow: inset 0 0 0 0 rgba(233,69,96,0); }
}
</style>
</head>
<body>
<div class="header"><span style="font-size:1.5rem">♟️</span><h1>ChessCoach</h1></div>

<div class="board-area">
  <div class="eval-bar" id="evalBar">
    <div class="eval-bar-white" id="evalWhite" style="flex:1"><span class="eval-bar-score" id="evalScoreTop">0.0</span></div>
    <div class="eval-bar-black" id="evalBlack" style="flex:1"><span class="eval-bar-score" id="evalScoreBot"></span></div>
  </div>
  <div class="board-container" id="boardContainer"></div>
</div>

<div class="eval-bar-h" id="evalBarH">
  <div class="eval-bar-white" id="evalWhiteH" style="flex:1"><span class="eval-bar-score" id="evalScoreTopH">0.0</span></div>
  <div class="eval-bar-black" id="evalBlackH" style="flex:1"><span class="eval-bar-score" id="evalScoreBotH"></span></div>
</div>

<div class="nav">
  <button id="btnStart" onclick="goTo(0)">⏮</button>
  <button id="btnPrev" onclick="goTo(currentPly-1)">◀</button>
  <button id="btnNext" onclick="goTo(currentPly+1)">▶</button>
  <button id="btnEnd" onclick="goTo(positions.length-1)">⏭</button>
  <button id="btnFlip" onclick="flipBoard()" style="margin-left:8px">🔄</button>
</div>

<div class="analysis-panel">
  <div class="engine-info">
    <div class="engine-header">
      <span class="engine-eval" id="engineEval">⏳</span>
      <span class="engine-depth" id="engineDepth"></span>
    </div>
    <div class="engine-bestline" id="engineBestline">Chargement de Stockfish...</div>
    <div class="depth-slider">
      <label>Profondeur</label>
      <input type="range" id="depthSlider" min="1" max="20" value="15">
      <span id="depthLabel">15</span>
    </div>
  </div>

  <div class="explanation-card error" id="cardError">
    <div class="card-title">⚠️ Erreur détectée</div>
    <div class="card-body" id="cardErrorBody"></div>
  </div>
  <div class="explanation-card good" id="cardGood">
    <div class="card-title">✅ Meilleur coup</div>
    <div class="card-body" id="cardGoodBody"></div>
  </div>
</div>

<div class="quiz-panel" id="quizPanel" style="display:none">
  <div class="quiz-card">
    <div class="quiz-title">♟️ Quiz — Trouve le meilleur coup !</div>
    <div class="quiz-subtitle" id="quizSubtitle"></div>
    <div class="quiz-msg" id="quizMsg"></div>
    <div class="quiz-attempts" id="quizAttempts"></div>
    <div id="quizButtons">
      <button class="quiz-btn" id="btnSeeError" onclick="seeError()">👁️ Voir l'erreur</button>
    </div>
    <div id="quizSuccessButtons" style="display:none">
      <button class="quiz-btn" id="btnReplay" onclick="replayFromGood()">▶️ Voir la suite</button>
    </div>
  </div>
  <div class="sources-card" id="sourcesCard">
    <div class="sources-title">📚 Pourquoi c'est mieux</div>
    <div class="sources-body" id="sourcesBody"></div>
  </div>
</div>

<div class="move-info" id="moveInfo"></div>

<script>
try { window.Telegram?.WebApp?.ready(); window.Telegram?.WebApp?.expand(); } catch(e) {}

/* --- URL Params --- */
const P = new URLSearchParams(location.search);
const pgnRaw = P.get('pgn') || '';
const errorMoveNum = parseInt(P.get('move')) || 0;
const badMove = P.get('bad') || '';
const goodMove = P.get('good') || '';
const explanationText = decodeURIComponent(P.get('explanation') || '');
const startFen = (P.get('fen') || '').replace(/\+/g, ' ');
const quizMode = P.get('quiz') === 'true';
const quizAnswer = P.get('answer') || '';
const errorLine = P.get('errorLine') || '';
const costParam = P.get('cost') || '';
const sourcesText = decodeURIComponent(P.get('sources') || P.get('explanation') || '');
// Auto-detect orientation: if player param is set and played Black, flip board
const playerParam = (P.get('player') || '').toLowerCase();
let orientation = P.get('orientation') || 'white';
if (playerParam && pgnRaw) {
  // Check PGN headers or detect from raw text
  const blackMatch = pgnRaw.match(/\[Black\s+"([^"]+)"\]/i);
  const whiteMatch = pgnRaw.match(/\[White\s+"([^"]+)"\]/i);
  if (blackMatch && blackMatch[1].toLowerCase() === playerParam) {
    orientation = 'black';
  } else if (whiteMatch && whiteMatch[1].toLowerCase() === playerParam) {
    orientation = 'white';
  }
}
// Also support simple color param: orientation=auto&color=black
const colorParam = P.get('color');
if (colorParam === 'black') orientation = 'black';
if (colorParam === 'white') orientation = 'white';

/* --- Piece images (Lichess cburnett) --- */
const PIECE_IMG = {
  'K':'wK','Q':'wQ','R':'wR','B':'wB','N':'wN','P':'wP',
  'k':'bK','q':'bQ','r':'bR','b':'bB','n':'bN','p':'bP'
};
const PIECE_BASE = 'https://lichess1.org/assets/piece/cburnett/';
const LIGHT = '#ebecd0', DARK = '#779556';

/* --- Game State --- */
let game = new Chess();
let positions = [];
let sanMoves = [];
let currentPly = 0;
let selectedSq = null;
let legalMoves = [];
let lastMove = null;

/* --- Load PGN or FEN --- */
function initGame() {
  if (pgnRaw) {
    let cleanPgn = pgnRaw.replace(/\{[^}]*\}/g, '').replace(/\[.*?\]\s*/g, '').replace(/\d+\.\.\./g, '').trim();
    const moveTokens = cleanPgn.replace(/1-0|0-1|1\/2-1\/2|\*/g, '').replace(/\d+\.\s*/g, ' ').trim().split(/\s+/).filter(Boolean);
    game.reset();
    positions = [game.fen()];
    sanMoves = [];
    for (const m of moveTokens) {
      const result = game.move(m);
      if (result) { sanMoves.push(result.san); positions.push(game.fen()); }
    }
  } else if (startFen) {
    game.load(startFen);
    positions = [game.fen()];
    sanMoves = [];
  } else {
    positions = [game.fen()];
    sanMoves = [];
  }
}
initGame();

/* --- Stockfish Engine --- */
let stockfish = null;
let engineDepth = 15;
let currentEval = 0; // in pawns, from white's perspective
let currentMateIn = null;
let bestLineSan = '';

function initStockfishWorker(worker) {
  stockfish = worker;
  stockfish.postMessage('uci');
  stockfish.postMessage('isready');
  stockfish.onmessage = function(e) {
    const line = e.data;
    if (typeof line !== 'string') return;

    if (line.startsWith('info') && line.includes(' pv ')) {
      // Parse score
      const cpMatch = line.match(/score cp (-?\d+)/);
      const mateMatch = line.match(/score mate (-?\d+)/);
      const depthMatch = line.match(/depth (\d+)/);
      const pvMatch = line.match(/ pv (.+)/);

      if (cpMatch) {
        currentMateIn = null;
        let cp = parseInt(cpMatch[1]);
        // Adjust for side to move
        const fen = positions[currentPly];
        const turn = fen.split(' ')[1];
        currentEval = turn === 'w' ? cp / 100 : -cp / 100;
      }
      if (mateMatch) {
        let mate = parseInt(mateMatch[1]);
        const fen = positions[currentPly];
        const turn = fen.split(' ')[1];
        currentMateIn = turn === 'w' ? mate : -mate;
        currentEval = mate > 0 ? (turn === 'w' ? 100 : -100) : (turn === 'w' ? -100 : 100);
      }
      if (pvMatch) {
        bestLineSan = uciLineToSan(pvMatch[1].trim(), positions[currentPly]);
      }
      if (depthMatch) {
        document.getElementById('engineDepth').textContent = 'depth ' + depthMatch[1];
      }
      updateEvalDisplay();
    }
    if (line.startsWith('bestmove')) {
      // Final result already shown via info lines
    }
  };
}

// Load Stockfish via blob to avoid cross-origin Worker restriction
(async function() {
  try {
    const resp = await fetch('https://cdn.jsdelivr.net/npm/stockfish.js@10.0.2/stockfish.js');
    const blob = await resp.blob();
    const worker = new Worker(URL.createObjectURL(blob));
    initStockfishWorker(worker);
    // Trigger initial analysis
    setTimeout(() => analyzePosition(), 500);
  } catch(e) {
    document.getElementById('engineBestline').textContent = 'Stockfish non disponible';
  }
})();

function uciLineToSan(uciLine, fen) {
  const moves = uciLine.split(/\s+/);
  const g = new Chess(fen);
  const sans = [];
  for (const uci of moves) {
    if (uci.length < 4) break;
    const from = uci.slice(0,2), to = uci.slice(2,4), promo = uci[4] || undefined;
    const r = g.move({from, to, promotion: promo});
    if (!r) break;
    sans.push(r.san);
    if (sans.length >= 6) break;
  }
  return sans.join(' ');
}

function analyzePosition() {
  if (!stockfish) return;
  const fen = positions[currentPly];
  stockfish.postMessage('stop');
  stockfish.postMessage('position fen ' + fen);
  stockfish.postMessage('go depth ' + engineDepth);
}

function updateEvalDisplay() {
  let evalText;
  if (currentMateIn !== null) {
    evalText = (currentMateIn > 0 ? '+' : '') + 'M' + Math.abs(currentMateIn);
  } else {
    evalText = (currentEval >= 0 ? '+' : '') + currentEval.toFixed(1);
  }
  document.getElementById('engineEval').textContent = evalText;
  document.getElementById('engineBestline').textContent = bestLineSan || '...';

  // Update eval bars
  let whitePercent;
  if (currentMateIn !== null) {
    whitePercent = currentMateIn > 0 ? 95 : 5;
  } else {
    // Sigmoid-like: map eval to 10-90% range
    whitePercent = 50 + (50 * (2 / (1 + Math.exp(-currentEval * 0.6)) - 1));
    whitePercent = Math.max(5, Math.min(95, whitePercent));
  }
  const blackPercent = 100 - whitePercent;

  // Vertical bar
  document.getElementById('evalWhite').style.flex = whitePercent;
  document.getElementById('evalBlack').style.flex = blackPercent;
  document.getElementById('evalScoreTop').textContent = currentEval >= 0 ? evalText : '';
  document.getElementById('evalScoreBot').textContent = currentEval < 0 ? evalText : '';

  // Horizontal bar
  document.getElementById('evalWhiteH').style.flex = whitePercent;
  document.getElementById('evalBlackH').style.flex = blackPercent;
  document.getElementById('evalScoreTopH').textContent = currentEval >= 0 ? evalText : '';
  document.getElementById('evalScoreBotH').textContent = currentEval < 0 ? evalText : '';
}

// Depth slider
document.getElementById('depthSlider').addEventListener('input', function() {
  engineDepth = parseInt(this.value);
  document.getElementById('depthLabel').textContent = engineDepth;
  analyzePosition();
});

/* --- Coordinate helpers --- */
function fileToX(f) { return orientation === 'white' ? f : 7 - f; }
function rankToY(r) { return orientation === 'white' ? r : 7 - r; }
function algToXY(sq) {
  const f = sq.charCodeAt(0) - 97;
  const r = 8 - parseInt(sq[1]);
  return [fileToX(f), rankToY(r)];
}
function xyToAlg(gx, gy) {
  const f = orientation === 'white' ? gx : 7 - gx;
  const r = orientation === 'white' ? gy : 7 - gy;
  return String.fromCharCode(97 + f) + (8 - r);
}

/* --- Render Board --- */
function render() {
  const fen = positions[currentPly];
  game.load(fen);
  const board = parseFen(fen);

  let svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">';

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const x = fileToX(c) * 100, y = rankToY(r) * 100;
      let color = (r + c) % 2 === 0 ? LIGHT : DARK;
      const sq = String.fromCharCode(97+c) + (8-r);
      svg += `<rect x="${x}" y="${y}" width="100" height="100" fill="${color}" data-sq="${sq}"/>`;
    }
  }

  if (lastMove) {
    for (const sq of [lastMove.from, lastMove.to]) {
      const [gx, gy] = algToXY(sq);
      svg += `<rect x="${gx*100}" y="${gy*100}" width="100" height="100" fill="rgba(255,255,0,0.35)" data-sq="${sq}"/>`;
    }
  }

  if (selectedSq) {
    const [sx, sy] = algToXY(selectedSq);
    svg += `<rect x="${sx*100}" y="${sy*100}" width="100" height="100" fill="rgba(255,255,0,0.4)"/>`;
    for (const m of legalMoves) {
      const [mx, my] = algToXY(m.to);
      const hasPiece = board[8-parseInt(m.to[1])][m.to.charCodeAt(0)-97];
      if (hasPiece) {
        svg += `<circle cx="${mx*100+50}" cy="${my*100+50}" r="45" fill="none" stroke="rgba(0,0,0,0.15)" stroke-width="8"/>`;
      } else {
        svg += `<circle cx="${mx*100+50}" cy="${my*100+50}" r="16" fill="rgba(0,0,0,0.15)"/>`;
      }
    }
  }

  const files = 'abcdefgh';
  for (let i = 0; i < 8; i++) {
    const fi = orientation === 'white' ? i : 7-i;
    const ri = orientation === 'white' ? i : 7-i;
    const cF = (7+i) % 2 === 0 ? LIGHT : DARK;
    const cR = i % 2 === 0 ? LIGHT : DARK;
    svg += `<text x="${i*100+90}" y="795" fill="${cF}" font-size="13" font-family="sans-serif" text-anchor="end">${files[fi]}</text>`;
    svg += `<text x="4" y="${i*100+16}" fill="${cR}" font-size="13" font-family="sans-serif">${8-ri}</text>`;
  }

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const piece = board[r][c];
      if (!piece) continue;
      const x = fileToX(c) * 100 + 5, y = rankToY(r) * 100 + 5;
      const sq = String.fromCharCode(97+c) + (8-r);
      const imgName = PIECE_IMG[piece];
      svg += `<image href="${PIECE_BASE}${imgName}.svg" x="${x}" y="${y}" width="90" height="90" data-sq="${sq}" style="cursor:pointer"/>`;
    }
  }

  // Arrows at error move (hidden in quiz mode until solved)
  if (!(quizMode && !quizSolved)) {
    if (currentPly === errorMoveNum - 1 || (errorMoveNum === 0 && !pgnRaw)) {
      if (goodMove && goodMove.length >= 4) svg += drawArrowSvg(goodMove.slice(0,2), goodMove.slice(2,4), '#4ade80');
      if (badMove && badMove.length >= 4) svg += drawArrowSvg(badMove.slice(0,2), badMove.slice(2,4), '#e94560');
    }
  }
  // In quiz mode, show green arrow for answer after solving
  if (quizMode && quizSolved && quizAnswer.length >= 4) {
    svg += drawArrowSvg(quizAnswer.slice(0,2), quizAnswer.slice(2,4), '#4ade80');
  }

  svg += '</svg>';
  document.getElementById('boardContainer').innerHTML = svg;

  document.getElementById('boardContainer').querySelector('svg').addEventListener('click', onBoardClick);
  document.getElementById('boardContainer').querySelector('svg').addEventListener('touchstart', onBoardTouch, {passive:false});

  updateButtons();
  updateExplanation();
  updateMoveInfo();
  analyzePosition();
}

function drawArrowSvg(from, to, color) {
  const [x1r, y1r] = algToXY(from);
  const x1 = x1r*100+50, y1 = y1r*100+50;
  const [x2r, y2r] = algToXY(to);
  const x2 = x2r*100+50, y2 = y2r*100+50;
  const dx = x2-x1, dy = y2-y1;
  const len = Math.sqrt(dx*dx+dy*dy);
  const ux = dx/len, uy = dy/len;
  const sx = x1+ux*10, sy = y1+uy*10;
  const ex = x2-ux*12, ey = y2-uy*12;
  const hl = 24, px = -uy, py = ux;
  const hx = ex-ux*hl, hy = ey-uy*hl;
  return `<line x1="${sx}" y1="${sy}" x2="${hx}" y2="${hy}" stroke="${color}" stroke-width="15" stroke-linecap="round" opacity="0.82"/>` +
         `<polygon points="${ex},${ey} ${hx+px*15},${hy+py*15} ${hx-px*15},${hy-py*15}" fill="${color}" opacity="0.82"/>`;
}

function parseFen(fen) {
  const board = [];
  const rows = fen.split(' ')[0].split('/');
  for (let r = 0; r < 8; r++) {
    board[r] = []; let c = 0;
    for (const ch of rows[r]) {
      if (ch >= '1' && ch <= '8') { for (let i = 0; i < parseInt(ch); i++) board[r][c++] = ''; }
      else board[r][c++] = ch;
    }
  }
  return board;
}

/* --- Interaction --- */
function getSqFromEvent(e) {
  const svgEl = document.getElementById('boardContainer').querySelector('svg');
  const rect = svgEl.getBoundingClientRect();
  const x = (e.clientX || e.touches?.[0]?.clientX) - rect.left;
  const y = (e.clientY || e.touches?.[0]?.clientY) - rect.top;
  const gx = Math.floor(x / rect.width * 8);
  const gy = Math.floor(y / rect.height * 8);
  if (gx < 0 || gx > 7 || gy < 0 || gy > 7) return null;
  return xyToAlg(gx, gy);
}

function onBoardClick(e) { handleInteraction(e); }
function onBoardTouch(e) { e.preventDefault(); handleInteraction(e); }

function handleInteraction(e) {
  const sq = getSqFromEvent(e);
  if (!sq) return;
  game.load(positions[currentPly]);
  const piece = game.get(sq);
  const turn = game.turn();

  if (selectedSq) {
    const move = legalMoves.find(m => m.to === sq);
    if (move) {
      let promo = undefined;
      if (move.flags.includes('p')) promo = 'q';
      // Quiz mode intercept
      if (quizMode && !quizSolved) {
        const ok = quizHandleMove(selectedSq, sq, promo);
        selectedSq = null; legalMoves = [];
        return;
      }
      const result = game.move({from: selectedSq, to: sq, promotion: promo});
      if (result) {
        if (currentPly < positions.length - 1) { positions.length = currentPly + 1; sanMoves.length = currentPly; }
        sanMoves.push(result.san);
        positions.push(game.fen());
        lastMove = {from: selectedSq, to: sq};
        currentPly++;
        selectedSq = null; legalMoves = [];
        render();
        return;
      }
    }
    if (piece && ((turn === 'w' && piece.color === 'w') || (turn === 'b' && piece.color === 'b'))) {
      selectedSq = sq; legalMoves = game.moves({square: sq, verbose: true}); render(); return;
    }
    selectedSq = null; legalMoves = []; render(); return;
  }

  if (piece && ((turn === 'w' && piece.color === 'w') || (turn === 'b' && piece.color === 'b'))) {
    // In quiz mode, don't allow interaction if solved (unless replaying) or if animating error
    if (quizMode && !quizSolved && errorAnimating) return;
    selectedSq = sq; legalMoves = game.moves({square: sq, verbose: true}); render();
  }
}

/* --- Navigation --- */
function goTo(ply) {
  if (ply < 0 || ply >= positions.length) return;
  currentPly = ply;
  selectedSq = null; legalMoves = [];
  if (ply > 0) {
    const prevGame = new Chess(); prevGame.load(positions[ply-1]);
    const moves = prevGame.moves({verbose:true});
    for (const m of moves) {
      prevGame.load(positions[ply-1]);
      const r = prevGame.move(m);
      if (r && prevGame.fen() === positions[ply]) { lastMove = {from: m.from, to: m.to}; break; }
    }
  } else { lastMove = null; }
  render();
}

function flipBoard() { orientation = orientation === 'white' ? 'black' : 'white'; render(); }

function updateButtons() {
  document.getElementById('btnStart').disabled = currentPly === 0;
  document.getElementById('btnPrev').disabled = currentPly === 0;
  document.getElementById('btnNext').disabled = currentPly >= positions.length - 1;
  document.getElementById('btnEnd').disabled = currentPly >= positions.length - 1;
}

function updateExplanation() {
  const cardError = document.getElementById('cardError');
  const cardGood = document.getElementById('cardGood');
  if (quizMode) { cardError.style.display = 'none'; cardGood.style.display = 'none'; return; }
  const showCards = currentPly === errorMoveNum - 1 || (errorMoveNum === 0 && !pgnRaw);

  if (showCards && explanationText) {
    cardError.style.display = 'block';
    document.getElementById('cardErrorBody').innerHTML = explanationText;
  } else {
    cardError.style.display = 'none';
  }

  if (showCards && goodMove) {
    cardGood.style.display = 'block';
    const goodSan = goodMove.length >= 4 ? goodMove : goodMove;
    document.getElementById('cardGoodBody').textContent = 'Coup recommandé : ' + goodSan;
  } else {
    cardGood.style.display = 'none';
  }
}

function updateMoveInfo() {
  const fen = positions[currentPly];
  const turn = fen.split(' ')[1] === 'w' ? 'Blancs' : 'Noirs';
  const plyText = currentPly > 0 ? ` (coup ${currentPly}/${positions.length-1})` : '';
  document.getElementById('moveInfo').textContent = `Trait aux ${turn}${plyText}`;
}

/* --- Keyboard navigation --- */
document.addEventListener('keydown', e => {
  if (quizMode && !quizSolved) {
    if (e.key === 'f' || e.key === 'F') flipBoard();
    return;
  }
  if (e.key === 'ArrowLeft') goTo(currentPly - 1);
  else if (e.key === 'ArrowRight') goTo(currentPly + 1);
  else if (e.key === 'Home') goTo(0);
  else if (e.key === 'End') goTo(positions.length - 1);
  else if (e.key === 'f' || e.key === 'F') flipBoard();
});

/* --- Quiz Mode --- */
let quizSolved = false;
let quizAttempts = 0;
let quizBasePly = 0; // the ply where the quiz position is
let errorAnimating = false;
let errorAnimationPly = 0;

function initQuiz() {
  if (!quizMode) return;
  // Hide nav buttons except flip
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnPrev').style.display = 'none';
  document.getElementById('btnNext').style.display = 'none';
  document.getElementById('btnEnd').style.display = 'none';
  // Hide analysis panel (eval + engine) until solved
  document.querySelector('.analysis-panel').style.display = 'none';
  // Hide eval bars
  document.getElementById('evalBar').style.display = 'none';
  document.getElementById('evalBarH').style.display = 'none';
  // Show quiz panel
  document.getElementById('quizPanel').style.display = 'block';
  if (costParam) {
    const pawns = (parseInt(costParam) / 100).toFixed(1);
    document.getElementById('quizSubtitle').textContent = 'Cette erreur t\'a coûté ' + pawns + ' pion' + (parseFloat(pawns) >= 2 ? 's' : '');
  }
  quizBasePly = currentPly;
  updateQuizAttempts();
}

function updateQuizAttempts() {
  if (quizAttempts > 0) {
    document.getElementById('quizAttempts').textContent = 'Tentative ' + quizAttempts + '/...';
  }
}

function quizHandleMove(from, to, promo) {
  const uci = from + to;
  quizAttempts++;
  updateQuizAttempts();
  if (uci === quizAnswer) {
    // CORRECT
    quizSolved = true;
    document.getElementById('quizMsg').className = 'quiz-msg correct';
    document.getElementById('quizMsg').textContent = '🎉 Bravo ! C\'est le bon coup !';
    document.getElementById('btnSeeError').style.display = 'none';
    document.getElementById('quizSuccessButtons').style.display = 'block';
    // Show eval
    document.querySelector('.analysis-panel').style.display = '';
    document.getElementById('evalBar').style.display = '';
    document.getElementById('evalBarH').style.display = '';
    // Show sources
    if (sourcesText) {
      document.getElementById('sourcesCard').style.display = 'block';
      document.getElementById('sourcesBody').textContent = sourcesText;
    }
    // Actually make the move
    game.load(positions[currentPly]);
    const result = game.move({from, to, promotion: promo});
    if (result) {
      if (currentPly < positions.length - 1) { positions.length = currentPly + 1; sanMoves.length = currentPly; }
      sanMoves.push(result.san);
      positions.push(game.fen());
      lastMove = {from, to};
      currentPly++;
    }
    render();
    return true;
  } else {
    // WRONG
    document.getElementById('quizMsg').className = 'quiz-msg wrong';
    document.getElementById('quizMsg').textContent = '❌ Ce n\'est pas le meilleur coup. Réessaie !';
    // Flash board
    const bc = document.getElementById('boardContainer');
    bc.classList.remove('board-flash');
    void bc.offsetWidth;
    bc.classList.add('board-flash');
    setTimeout(() => bc.classList.remove('board-flash'), 500);
    // Reset position
    selectedSq = null; legalMoves = [];
    render();
    return false;
  }
}

function seeError() {
  if (!errorLine) return;
  const moves = errorLine.split(',');
  errorAnimating = true;
  errorAnimationPly = 0;
  // Save current position
  const savedPly = currentPly;
  const g = new Chess(positions[quizBasePly]);

  document.getElementById('btnSeeError').style.display = 'none';
  const backBtn = document.createElement('button');
  backBtn.className = 'quiz-btn';
  backBtn.textContent = '↩️ Revenir';
  backBtn.onclick = function() {
    errorAnimating = false;
    // Restore positions to original
    positions.length = quizBasePly + 1;
    sanMoves.length = quizBasePly;
    currentPly = quizBasePly;
    lastMove = null;
    backBtn.remove();
    document.getElementById('btnSeeError').style.display = '';
    document.getElementById('quizMsg').textContent = '';
    render();
  };
  document.getElementById('quizButtons').appendChild(backBtn);

  let i = 0;
  function playNext() {
    if (i >= moves.length || !errorAnimating) return;
    const uci = moves[i].trim();
    if (uci.length < 4) return;
    const from = uci.slice(0,2), to = uci.slice(2,4), promo = uci[4] || undefined;
    const r = g.move({from, to, promotion: promo});
    if (!r) return;
    // Extend positions
    if (currentPly < positions.length - 1) { positions.length = currentPly + 1; sanMoves.length = currentPly; }
    sanMoves.push(r.san);
    positions.push(g.fen());
    lastMove = {from, to};
    currentPly++;
    render();
    i++;
    if (i < moves.length) setTimeout(playNext, 1000);
  }
  playNext();
}

function replayFromGood() {
  // Just enable navigation from the solved position
  document.getElementById('btnNext').style.display = '';
  document.getElementById('btnEnd').style.display = '';
  document.getElementById('btnPrev').style.display = '';
  document.getElementById('btnStart').style.display = '';
}

/* --- Initial render --- */
if (errorMoveNum > 0 && errorMoveNum <= positions.length) {
  goTo(errorMoveNum - 1);
} else {
  render();
}
initQuiz();
</script>
